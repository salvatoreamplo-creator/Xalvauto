spring.config.import=optional:file:./env.properties
spring.application.name=xalvautoBE
server.port=${PORT:8080}
spring.datasource.url=${JDBC_URI:${DB_URL}}
spring.datasource.username=${PG_USERNAME}
spring.datasource.password=${PG_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
jwt.secret=${JWT_SECRET}
# CLOUDINARY DATA
cloudinary.name=${CLOUDINARY_NAME}
cloudinary.apikey=${CLOUDINARY_API_KEY}
cloudinary.secret=${CLOUDINARY_SECRET}
# Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Mailgun
mailgun.domain=${MAILGUN_DOMAIN}
mailgun.api.key=${MAILGUN_API_KEY}
mailgun.from=${EMAIL_FROM}
mailgun.to=salvatoreamplo@gmail.com
# ADMIN
PASS=${PASS}
admin.email=${ADMIN_EMAIL}