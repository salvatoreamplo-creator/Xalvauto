spring.config.import=file:env.properties
spring.application.name=xalvautoBE
server.port=${PORT}
spring.datasource.url=${DB_URL}
spring.datasource.username=${PG_USERNAME}
spring.datasource.password=${PG_PASSWORD}
spring.datasource.driver=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
jwt.secret=${JWT_SECRET}
# CLOUDINARY DATA
cloudinary.name=${CLOUDINARY_NAME}
cloudinary.apikey=${CLOUDINARY_API_KEY}
cloudinary.secret=${CLOUDINARY_SECRET}
# Dimensione massima del singolo file
spring.servlet.multipart.max-file-size=10MB
# Dimensione massima della richiesta totale (nel caso caricassi pi¨ file insieme)
spring.servlet.multipart.max-request-size=10MB
mailgun.domain=${MAILGUN_DOMAIN}
mailgun.apiKey=${MAILGUN_API_KEY}
email.from=${EMAIL_FROM}
# ADMIN
PASS=${PASS}